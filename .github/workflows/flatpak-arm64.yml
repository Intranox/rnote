name: Flatpak ARM64 (QEMU no container)

on:
  workflow_dispatch:

jobs:
  flatpak:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install Flatpak
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder

      - name: Add Flathub
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak ARM64
        run: |
          flatpak-builder \
            --arch=aarch64 \
            --install-deps-from=flathub \
            --force-clean \
            build-dir \
            build-aux/com.github.flxzt.rnote.Devel.yaml

      - name: Build bundle
        run: |
          flatpak build-bundle repo rnote-arm64.flatpak com.github.flxzt.rnote.Devel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rnote-arm64
          path: rnote-arm64.flatpak
